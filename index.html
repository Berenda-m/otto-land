<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otto Legos personalizados</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></head>
<body>
    <header>
        <h1>Otto Legoland</h1>
        <nav>
            <a href="contato.html" class="button">Contato</a>
            <a href="sobre.html" class="button">Sobre</a>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h2>Sobre mim</h2>
            <figure>
                <img src="img/perfil.jpg" alt="Foto de perfil, criança montando um lego" width="280" height="250"
                    loading="lazy">
                <figcaption>Feito por criança e para criança, aqui exercitamos a criatividade com lego e suas milhares
                    de possibilidades </figcaption>
            </figure>
        </section>
        <section class="galeria">
            <h2 class="subtitulo">Galeria</h2>
        </section>
        <section>
            <div class="item item1">
                <p>Projetos em grupo <i class="fa-solid fa-angles-down"></i></p>
                <img src="img/projeto-1.jpg" alt="Projetos em Grupo" width="400" height="250" loading="lazy">
            </div>
            <div class="item item2">
                <p>Estilizando Minifigures <i class="fa-solid fa-angles-down"></i></p>
                <img src="img/sessao-bonecos.jpg" alt="Estilizando Minifigures" width="400" height="250" loading="lazy">
            </div>
            <div class="item item3"><p>Construindo Cidades <i class="fa-solid fa-angles-down"></i></p>
            <img src="img/sessao-cidades.webp" alt="Construindo cidades" width="400" height="250" loading="lazy"></div>
            <div class="item item4"><p>Construindo casas e lojas <i class="fa-solid fa-angles-down"></i></p>
            <img src="img/sessão-casas.jpg" alt="Construindo casas e lojas" width="400" height="250" loading="lazy"></div>
            <div class="item item5"><p>Ideias para peças avulsas<i class="fa-solid fa-angles-down"></i></p>
            <img src="img/sessão-peças-avulsas.jpg" alt="Ideias para peças avulsas" width="400" height="250"
                loading="lazy"></div>
            <div class="item item6"><p>Montando familias <i class="fa-solid fa-angles-down"></i></p>
            <img src="img/sessão-social.jpg" alt="Montando familias" width="400" height="250" loading="lazy"></div>
        </section>
    </main>
    <footer>
        <h4>Fale conosco</h4>
        <h5>&copy; Otto Legoland-2026</h5>
    </footer>

</body>

</html>
